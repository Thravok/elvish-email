stages:
  - lint
  - security
  - test
  - build
  - container-scan
  - release

# Include GitLab security scanning templates
# Note: These templates require GitLab Ultimate or proper configuration
# Disabled temporarily due to image configuration issues
# include:
#   - template: Security/Dependency-Scanning.gitlab-ci.yml
#   - template: Security/Container-Scanning.gitlab-ci.yml
#   - template: Security/SAST.gitlab-ci.yml
#   - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  # Go module caching
  GOPATH: $CI_PROJECT_DIR/.go
  GOCACHE: $CI_PROJECT_DIR/.go-cache
  GOMODCACHE: $CI_PROJECT_DIR/.go/pkg/mod

# Go Format Check
lint-fmt:
  image: golang:1.25-bookworm
  stage: lint
  # No cache needed for fmt check - faster without restoring .go/
  script:
    # Check only project source directories, not module cache
    - |
      unformatted=$(gofmt -l cmd/ internal/ 2>/dev/null || true)
      if [ -n "$unformatted" ]; then
        echo "gofmt needed on:"
        echo "$unformatted"
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# Go Vet
lint-vet:
  image: golang:1.25-bookworm
  stage: lint
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .go-cache/
  script:
    - go vet ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# golangci-lint
lint-golangci:
  image: golang:1.25-bookworm
  stage: lint
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .go-cache/
  script:
    - go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.63.4 run
    # Invariant: there is no server-side body-search endpoint. ADR 0008.
    # Exclude test files; match route declarations (quoted paths), not comments.
    - |
      if grep -RIn --include='*.go' --exclude='*_test.go' '"[^"]*search/body' internal/httpserver/ ; then
        echo "ERROR: forbidden body-search route detected — see ADR 0008"
        exit 1
      fi
    # Invariant: protected-link password (Mode B) never reaches the server. ADR 0009.
    - |
      if grep -RIn --include='*.go' -E '"(password|kek_b64|recipient_password|sender_password)"' \
        internal/httpserver/api_protected_links.go internal/maillinks/ internal/relaykey/ 2>/dev/null ; then
        echo "ERROR: protected-link password leaked into server code — see ADR 0009"
        exit 1
      fi
    - go run ./cmd/apiroutes -check
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# Vulnerability scanning with govulncheck
security-vuln:
  image: golang:1.25-bookworm
  stage: security
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .go-cache/
  script:
    - go run golang.org/x/vuln/cmd/govulncheck@latest ./...
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# GitLab SAST (Static Application Security Testing)
# Scans source code for security vulnerabilities
# Disabled - requires GitLab security scanning templates to be properly configured
