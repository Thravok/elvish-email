# Unit Tests
test-unit:
  image: golang:1.25-bookworm
  stage: test
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .go-cache/
  script:
    - go test ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# Flutter Android mail client (see docs/client-parity-roadmap.md)
test-flutter:
  image: ghcr.io/cirruslabs/flutter:stable
  stage: test
  cache:
    key: flutter-pub-${CI_COMMIT_REF_SLUG}
    paths:
      - flutter/elvish_mail/.dart_tool/
      - flutter/elvish_mail/.pub-cache/
  variables:
    PUB_CACHE: $CI_PROJECT_DIR/flutter/elvish_mail/.pub-cache
  script:
    - cd flutter/elvish_mail
    - flutter pub get
    - flutter analyze --no-fatal-infos
    - flutter test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# Race Condition Tests
test-race:
  image: golang:1.25-bookworm
  stage: test
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .go-cache/
  script:
    - go test -race ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# Benchmark Smoke Tests
test-bench-smoke:
  image: golang:1.25-bookworm
  stage: test
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .go-cache/
  script:
    - go test -bench=. -benchtime=1x ./...
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# Integration Tests (requires Docker services)
# Disabled by default - enable when needed
test-integration:
  image: golang:1.25-bookworm
  stage: test
  services:
    - name: cockroachdb/cockroach:v24.1.0
      alias: cockroach
      command: ["start-single-node", "--insecure", "--listen-addr=0.0.0.0:26257"]
    - name: valkey/valkey:8-alpine
      alias: valkey
  variables:
    COCKROACH_DSN: "postgres://root@cockroach:26257/defaultdb?sslmode=disable"
    VALKEY_ADDR: "valkey:6379"
    ELVISH_INTEGRATION_DB: "1"
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .go-cache/
  before_script:
    # Wait for CockroachDB to be ready
    - |
      for i in $(seq 1 30); do
        if pg_isready -h cockroach -p 26257 2>/dev/null; then
          echo "CockroachDB is ready"
          break
        fi
        echo "Waiting for CockroachDB... ($i/30)"
        sleep 2
      done
  script:
    - go test ./internal/db -run TestCockroachMigrationsAndMailstore -count=1 -v
    - go test ./internal/httpserver -run TestAdminUptimeAPIIntegration -count=1 -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - when: never  # Disabled - enable manually when integration tests are needed
    # - if: $CI_COMMIT_BRANCH

# E2E Tests (Playwright)
# Disabled by default - requires running elvishserver
test-e2e:
  image: mcr.microsoft.com/playwright:v1.49.1-jammy
  stage: test
  cache:
    paths:
      - e2e/node_modules/
  before_script:
    - cd e2e
    - npm ci
  script:
    - npm test
  variables:
    BASE_URL: "http://elvishserver:8765"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - when: never  # Disabled - requires separate elvishserver instance
    # - if: $CI_COMMIT_BRANCH
    #   exists:
    #     - e2e/package.json

# Build Go Binary (verification only, not published)
build-binary:
  image: golang:1.25-bookworm
  stage: build
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .go-cache/
  script:
    - mkdir -p bin
    - CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/elvishserver ./cmd/elvishserver
  artifacts:
    paths:
      - bin/elvishserver
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH

# Docker Build - elvishserver (using Kaniko, no Docker daemon required)
docker-build-elvishserver:
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  stage: build
  script:
    - |
      # Create Kaniko config for registry auth
      mkdir -p /kaniko/.docker
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - |
      # Build and push image
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}" \
        --cache=true \
        --cache-repo="${CI_REGISTRY_IMAGE}/cache"
    - |
      # Also tag as latest on default branch
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        /kaniko/executor \
          --context "${CI_PROJECT_DIR}" \
          --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
          --destination "${CI_REGISTRY_IMAGE}:latest" \
          --cache=true \
          --cache-repo="${CI_REGISTRY_IMAGE}/cache"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"
      when: never
    - if: $CI_COMMIT_BRANCH
      exists:
        - Dockerfile

# Renovate: opens a child pipeline so this schedule does not run lint/test/build here.
# GitLab → Build → Pipeline schedules: new schedule on the default branch, variable RENOVATE_SCHEDULE=true,
# and masked CI variable RENOVATE_TOKEN (project access token: api + write_repository). Details: CONTRIBUTING.md.
renovate-child:
  stage: security
  trigger:
    include:
      - local: .gitlab/ci/renovate-child.gitlab-ci.yml
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_SCHEDULE == "true"

