name: elvish_mail
description: ELVish mail client for Android (Flutter). Uses the same JSON API as the Swift iOS app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cookie_jar: ^4.0.8
  crypto: ^3.0.3
  cryptography: ^2.7.0
  dart_pg: ^2.1.0
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  flutter_secure_storage: ^9.2.2
  meta: ^1.12.0
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
