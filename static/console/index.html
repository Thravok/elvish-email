<!doctype html>
<html lang="en" data-font="ibm" data-site-theme-default="light" data-console-standalone="1">
<head>
  <meta charset="utf-8" />
  <title>ELVISH — Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="page.css" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="modals.css" />

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "font": "ibm",
      "showGrid": false,
      "scanlines": false
    }/*EDITMODE-END*/;
    (function () {
      var el = document.documentElement;
      function resolve(raw) {
        if (raw === "dark" || raw === "light") return raw;
        try {
          return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        } catch (e) {
          return "light";
        }
      }
      (async function () {
        var raw = TWEAK_DEFAULTS.theme || "light";
        try {
          var r = await fetch("/api/staff/me", { credentials: "include" });
          var j = await r.json().catch(function () { return {}; });
          if (j && j.staff && j.staff.ui_theme) {
            el.setAttribute("data-user-ui-theme", String(j.staff.ui_theme));
            raw = String(j.staff.ui_theme);
          }
        } catch (e1) {}
        el.setAttribute("data-theme", resolve(raw));
        el.setAttribute("data-theme-preference", raw);
      })();
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <script src="dev-trace.js"></script>
  <script src="/perf.js"></script>
  <script src="/vendor/openpgp-6.3.0.min.js" integrity="sha384-Z5tStPoeClmuLPd1gAwdTCU53WcAkUjBNw7mEEvrQumVuNqEl52A9Nx5IhFdKE/c"></script>
  <script src="/vendor/argon2-browser-1.18.0-bundled.min.js"></script>
  <script src="/auth/keygen.js"></script>

  <script src="/dist/console-bundle.js" defer></script>
</body>
</html>
