<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Human verification</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; }
    #host { min-height: 52px; padding: 8px 10px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="host"></div>
  <script src="/vendor/cap-widget-compat-0.1.51.min.js"></script>
  <script>
    (function () {
      function post(msg) {
        var s = JSON.stringify(msg);
        try {
          if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.elvishCap) {
            window.webkit.messageHandlers.elvishCap.postMessage(msg);
            return;
          }
        } catch (e1) {}
        try {
          if (typeof ElvishCap !== "undefined" && ElvishCap.postMessage) {
            ElvishCap.postMessage(s);
            return;
          }
        } catch (e2) {}
      }
      var params = new URLSearchParams(location.search);
      var endpoint = params.get("endpoint");
      if (!endpoint) {
        post({ type: "error", detail: "missing endpoint" });
        return;
      }
      var el = document.createElement("cap-widget");
      el.setAttribute("data-cap-api-endpoint", endpoint);
      el.addEventListener("solve", function (ev) {
        var tok = (ev && ev.detail && ev.detail.token) || "";
        post({ type: "token", token: tok });
      });
      el.addEventListener("reset", function () {
        post({ type: "reset" });
      });
      document.getElementById("host").appendChild(el);
    })();
  </script>
</body>
</html>
