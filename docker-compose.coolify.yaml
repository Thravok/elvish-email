# Elvish — Coolify production (Docker Compose is the source of truth).
# Operator guide: docs/deploy-coolify.md
# Coolify does not support YAML anchors (x-* / & / *); env is duplicated per service.
#
# App images: ghcr.io/thravok/elvish-email/<role>:<tag> (built by .github/workflows/docker-publish.yml).
# Override tag with ELVISH_IMAGE_TAG in Coolify (default main). web/admin bake api-config.js at container start.

services:
  api:
    image: ghcr.io/thravok/elvish-email/api:${ELVISH_IMAGE_TAG:-main}
    command: ["/usr/local/bin/elvishapi", "-addr", ":8765", "-root", "/app"]
    depends_on:
      cockroach:
        condition: service_healthy
      valkey:
        condition: service_healthy
      scylla:
        condition: service_healthy
      minio:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      - SERVICE_URL_API_8765
      - SERVICE_FQDN_API
      - SERVICE_URL_WEB_8080
      - SERVICE_FQDN_WEB
      - SERVICE_URL_ADMIN_8080
      - SERVICE_FQDN_ADMIN
      - SERVICE_PASSWORD_64_VALKEY
      - SERVICE_USER_MINIO
      - SERVICE_PASSWORD_64_MINIO
      - SERVICE_BASE64_64
      - COCKROACH_DSN=postgres://root@cockroach:26257/defaultdb?sslmode=disable
      - VALKEY_ADDR=valkey:6379
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-${SERVICE_PASSWORD_64_VALKEY}}
      - VALKEY_DB=${VALKEY_DB:-0}
      - SCYLLA_HOSTS=scylla:9042
      - SCYLLA_KEYSPACE=${SCYLLA_KEYSPACE:-elvish_mail}
      - SCYLLA_USERNAME=${SCYLLA_USERNAME:-}
      - SCYLLA_PASSWORD=${SCYLLA_PASSWORD:-}
      - BLOB_S3_ENDPOINT=http://minio:9000
      - BLOB_S3_REGION=${BLOB_S3_REGION:-us-east-1}
      - BLOB_S3_BUCKET=${BLOB_S3_BUCKET:-elvish-mail}
      - BLOB_S3_ACCESS_KEY=${BLOB_S3_ACCESS_KEY:-${SERVICE_USER_MINIO}}
      - BLOB_S3_SECRET_KEY=${BLOB_S3_SECRET_KEY:-${SERVICE_PASSWORD_64_MINIO}}
      - BLOB_S3_FORCE_PATH_STYLE=1
      - ELVISH_HOSTNAME=${ELVISH_HOSTNAME:-}
      - ELVISH_MAIL_DOMAIN=${ELVISH_MAIL_DOMAIN:-}
      - ELVISH_SERVE_STATIC=0
      - ELVISH_PUBLIC_BASE_URL=${ELVISH_PUBLIC_BASE_URL:-$SERVICE_URL_WEB_8080}
      - ELVISH_WEB_ORIGIN=${ELVISH_WEB_ORIGIN:-$SERVICE_URL_WEB_8080}
      - ELVISH_ADMIN_ORIGIN=${ELVISH_ADMIN_ORIGIN:-$SERVICE_URL_ADMIN_8080}
      - ELVISH_WEB_ORIGINS=${ELVISH_WEB_ORIGINS:-$SERVICE_URL_WEB_8080,$SERVICE_URL_ADMIN_8080}
      - ELVISH_COOKIE_DOMAIN=${ELVISH_COOKIE_DOMAIN:-}
      - ELVISH_TRUST_FORWARDED_FOR=${ELVISH_TRUST_FORWARDED_FOR:-1}
      - ELVISH_SMTP_ADDR=
      - ELVISH_SMTP_SUBMISSION_ADDR=
      - COOKIE_SECURE=${COOKIE_SECURE:?1}
      - ELVISH_AUTO_GEN_MFA_KEY=${ELVISH_AUTO_GEN_MFA_KEY:-0}
      - ELVISH_MFA_ENCRYPTION_KEY=${ELVISH_MFA_ENCRYPTION_KEY:-${SERVICE_BASE64_64}}
      - ELVISH_ALLOW_EMPTY_DB=0
    volumes:
      - elvish_data:/app/data
    restart: unless-stopped

  web:
    image: ghcr.io/thravok/elvish-email/web:${ELVISH_IMAGE_TAG:-main}
    entrypoint: ["sh", "/runtime/write-api-config.sh"]
    volumes:
      - type: bind
        source: ./docker/nginx/write-api-config.sh
        target: /runtime/write-api-config.sh
        read_only: true
    depends_on:
      api:
        condition: service_started
    environment:
      - SERVICE_URL_WEB_8080
      - SERVICE_FQDN_WEB
      - ELVISH_API_BASE=${ELVISH_API_BASE:-$SERVICE_URL_API_8765}
      - ELVISH_ADMIN_ORIGIN=${ELVISH_ADMIN_ORIGIN:-$SERVICE_URL_ADMIN_8080}
    restart: unless-stopped

  admin:
    image: ghcr.io/thravok/elvish-email/admin:${ELVISH_IMAGE_TAG:-main}
    entrypoint: ["sh", "/runtime/write-admin-api-config.sh"]
    volumes:
      - type: bind
        source: ./docker/nginx/write-admin-api-config.sh
        target: /runtime/write-admin-api-config.sh
        read_only: true
    depends_on:
      api:
        condition: service_started
    environment:
      - SERVICE_URL_ADMIN_8080
      - SERVICE_FQDN_ADMIN
      - ELVISH_API_BASE=${ELVISH_API_BASE:-$SERVICE_URL_API_8765}
    restart: unless-stopped

  worker:
    image: ghcr.io/thravok/elvish-email/worker:${ELVISH_IMAGE_TAG:-main}
    command: ["/usr/local/bin/elvishworker", "-root", "/app"]
    depends_on:
      cockroach:
        condition: service_healthy
      valkey:
        condition: service_healthy
      scylla:
        condition: service_healthy
      minio:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      - SERVICE_PASSWORD_64_VALKEY
      - SERVICE_USER_MINIO
      - SERVICE_PASSWORD_64_MINIO
      - SERVICE_BASE64_64
      - COCKROACH_DSN=postgres://root@cockroach:26257/defaultdb?sslmode=disable
      - VALKEY_ADDR=valkey:6379
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-${SERVICE_PASSWORD_64_VALKEY}}
      - VALKEY_DB=${VALKEY_DB:-0}
      - SCYLLA_HOSTS=scylla:9042
      - SCYLLA_KEYSPACE=${SCYLLA_KEYSPACE:-elvish_mail}
      - SCYLLA_USERNAME=${SCYLLA_USERNAME:-}
      - SCYLLA_PASSWORD=${SCYLLA_PASSWORD:-}
      - BLOB_S3_ENDPOINT=http://minio:9000
      - BLOB_S3_REGION=${BLOB_S3_REGION:-us-east-1}
      - BLOB_S3_BUCKET=${BLOB_S3_BUCKET:-elvish-mail}
      - BLOB_S3_ACCESS_KEY=${BLOB_S3_ACCESS_KEY:-${SERVICE_USER_MINIO}}
      - BLOB_S3_SECRET_KEY=${BLOB_S3_SECRET_KEY:-${SERVICE_PASSWORD_64_MINIO}}
      - BLOB_S3_FORCE_PATH_STYLE=1
      - ELVISH_HOSTNAME=${ELVISH_HOSTNAME:-}
      - ELVISH_MFA_ENCRYPTION_KEY=${ELVISH_MFA_ENCRYPTION_KEY:-${SERVICE_BASE64_64}}
      - ELVISH_ALLOW_EMPTY_DB=0
    volumes:
      - elvish_data:/app/data
    restart: unless-stopped

  # Optional — not in default deploy (Coolify cannot build from partial checkout paths).
  # Enable: COMPOSE_PROFILES=docs in Coolify, or after GHCR image exists: pull ghcr.io/thravok/elvish-email/docs:main
  docs:
    profiles: [docs]
    image: ghcr.io/thravok/elvish-email/docs:${ELVISH_IMAGE_TAG:-main}
    restart: unless-stopped

  mail-mta:
    image: ghcr.io/thravok/elvish-email/mta:${ELVISH_IMAGE_TAG:-main}
    command: ["/usr/local/bin/elvishmta", "-root", "/app"]
    depends_on:
      cockroach:
        condition: service_healthy
      valkey:
        condition: service_healthy
      scylla:
        condition: service_healthy
      minio:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      - SERVICE_PASSWORD_64_VALKEY
      - SERVICE_USER_MINIO
      - SERVICE_PASSWORD_64_MINIO
      - SERVICE_BASE64_64
      - COCKROACH_DSN=postgres://root@cockroach:26257/defaultdb?sslmode=disable
      - VALKEY_ADDR=valkey:6379
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-${SERVICE_PASSWORD_64_VALKEY}}
      - VALKEY_DB=${VALKEY_DB:-0}
      - SCYLLA_HOSTS=scylla:9042
      - SCYLLA_KEYSPACE=${SCYLLA_KEYSPACE:-elvish_mail}
      - SCYLLA_USERNAME=${SCYLLA_USERNAME:-}
      - SCYLLA_PASSWORD=${SCYLLA_PASSWORD:-}
      - BLOB_S3_ENDPOINT=http://minio:9000
      - BLOB_S3_REGION=${BLOB_S3_REGION:-us-east-1}
      - BLOB_S3_BUCKET=${BLOB_S3_BUCKET:-elvish-mail}
      - BLOB_S3_ACCESS_KEY=${BLOB_S3_ACCESS_KEY:-${SERVICE_USER_MINIO}}
      - BLOB_S3_SECRET_KEY=${BLOB_S3_SECRET_KEY:-${SERVICE_PASSWORD_64_MINIO}}
      - BLOB_S3_FORCE_PATH_STYLE=1
      - ELVISH_HTTP_ENABLED=${ELVISH_HTTP_ENABLED:-0}
      - ELVISH_HOSTNAME=${ELVISH_HOSTNAME:-}
      - ELVISH_MAIL_DOMAIN=${ELVISH_MAIL_DOMAIN:-}
      - ELVISH_SMTP_ADDR=${ELVISH_SMTP_ADDR:-:25}
      - ELVISH_SMTP_SUBMISSION_ADDR=${ELVISH_SMTP_SUBMISSION_ADDR:-:587}
      - ELVISH_SMTP_ALLOW_PLAIN_AUTH=${ELVISH_SMTP_ALLOW_PLAIN_AUTH:-0}
      - ELVISH_SMTP_TLS_CERT_PATH=${ELVISH_SMTP_TLS_CERT_PATH:-}
      - ELVISH_SMTP_TLS_KEY_PATH=${ELVISH_SMTP_TLS_KEY_PATH:-}
      - ELVISH_MFA_ENCRYPTION_KEY=${ELVISH_MFA_ENCRYPTION_KEY:-${SERVICE_BASE64_64}}
      - ELVISH_ALLOW_EMPTY_DB=0
    volumes:
      - elvish_data:/app/data
    ports:
      - "25:25"
      - "587:587"
    restart: unless-stopped

  # Internal only — do not declare SERVICE_URL_* / SERVICE_FQDN_* (Coolify would offer a public domain).
  cockroach:
    image: cockroachdb/cockroach:v24.2.4
    hostname: cockroach
    command:
      - start-single-node
      - --insecure
      - --http-addr=127.0.0.1:8080
      - --cache=${COCKROACH_CACHE:-256MiB}
      - --max-sql-memory=${COCKROACH_MAX_SQL_MEMORY:-256MiB}
    volumes:
      - elvish_crdb_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  valkey:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
      - --requirepass
      - ${VALKEY_PASSWORD:-${SERVICE_PASSWORD_64_VALKEY}}
    environment:
      - SERVICE_PASSWORD_64_VALKEY
    volumes:
      - elvish_valkey_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${VALKEY_PASSWORD:-${SERVICE_PASSWORD_64_VALKEY}}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  scylla:
    image: scylladb/scylla:5.4
    command:
      - --smp
      - ${SCYLLA_SMP:-2}
      - --memory
      - ${SCYLLA_MEMORY:-2G}
      - --overprovisioned
      - "1"
      - --reactor-backend=epoll
      - --developer-mode
      - "1"
    volumes:
      - elvish_scylla_data:/var/lib/scylla
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh -h 127.0.0.1 -p 9042 -e 'SELECT cluster_name FROM system.local LIMIT 1' >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 180s
    restart: unless-stopped

  scylla-init:
    image: scylladb/scylla:5.4
    exclude_from_hc: true
    depends_on:
      scylla:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./libs/go/scyllastore/schema.cql
        target: /schema.cql
        read_only: true
      - type: bind
        source: ./docker/scylla-init.sh
        target: /scylla-init.sh
        read_only: true
    entrypoint: ["sh", "/scylla-init.sh"]
    restart: "no"

  # Internal only — S3 API on :9000; no SERVICE_URL_* (console not exposed).
  minio:
    image: minio/minio:latest
    command: server /data --address ":9000"
    environment:
      - SERVICE_USER_MINIO
      - SERVICE_PASSWORD_64_MINIO
      - MINIO_ROOT_USER=${BLOB_S3_ACCESS_KEY:-${SERVICE_USER_MINIO}}
      - MINIO_ROOT_PASSWORD=${BLOB_S3_SECRET_KEY:-${SERVICE_PASSWORD_64_MINIO}}
    volumes:
      - elvish_minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mc alias set health http://localhost:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD >/dev/null 2>&1 && mc admin info health >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    exclude_from_hc: true
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - SERVICE_USER_MINIO
      - SERVICE_PASSWORD_64_MINIO
      - BLOB_S3_ACCESS_KEY=${BLOB_S3_ACCESS_KEY:-${SERVICE_USER_MINIO}}
      - BLOB_S3_SECRET_KEY=${BLOB_S3_SECRET_KEY:-${SERVICE_PASSWORD_64_MINIO}}
      - BLOB_S3_BUCKET=${BLOB_S3_BUCKET:-elvish-mail}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "minio-init: waiting for MinIO..."
        until mc alias set local http://minio:9000 "$${BLOB_S3_ACCESS_KEY}" "$${BLOB_S3_SECRET_KEY}" 2>/dev/null; do
          sleep 2
        done
        echo "minio-init: creating bucket $${BLOB_S3_BUCKET}..."
        mc mb --ignore-existing "local/$${BLOB_S3_BUCKET}"
        echo "minio-init: bucket ready"
    restart: "no"

volumes:
  elvish_crdb_data:
  elvish_valkey_data:
  elvish_scylla_data:
  elvish_minio_data:
  elvish_data:
