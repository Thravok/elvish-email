# Dev frontend: serve matching files from /usr/share/nginx/html (repo static/), else proxy to elvishserver.
# Preserves single-origin cookies and relative /api paths from the browser.

upstream elvish_api {
    server api:8765;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    client_max_body_size 32m;

    # API always hits the Go server (sessions, JSON, uploads).
    location ^~ /api/ {
        proxy_pass http://elvish_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Prefer disk when a file exists (CSS/JS/admin shell); otherwise SSR + routes stay on Go.
    location / {
        try_files $uri $uri/ @elvish_api;
    }

    location @elvish_api {
        proxy_pass http://elvish_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
