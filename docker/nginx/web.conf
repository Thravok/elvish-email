server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        default_type application/json;
        return 200 '{"ok":true,"surface":"web"}';
    }

    location = /mail {
        try_files /mail/index.html =404;
    }
    location = /login {
        try_files /auth/login.html =404;
    }
    location = /register {
        try_files /auth/register.html =404;
    }
    location ^~ /m/ {
        try_files /protected/index.html =404;
    }
    location / {
        try_files $uri $uri/ =404;
    }
}
