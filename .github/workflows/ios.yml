# ELVish Mail — SwiftUI iOS client (IOS/IOS.xcodeproj, IOSTests).
name: iOS

on:
  push:
    branches: [main]
    paths:
      - "IOS/**"
      - "IOSTests/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "IOS/**"
      - "IOSTests/**"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: IOSTests (Simulator)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        working-directory: IOS
        run: |
          set -euo pipefail
          xcodebuild test \
            -project IOS.xcodeproj \
            -scheme IOS \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
