# ELVish Mail — SwiftUI iOS client (IOS/IOS.xcodeproj, IOSTests).
name: iOS

on:
  push:
    branches: [main]
    paths:
      - "IOS/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "IOS/**"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: IOSTests (Simulator)
    # IOS targets iOS 26.5; macos-latest (Xcode 16.4 / iOS 18 sims) cannot satisfy -destination.
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Resolve iOS Simulator destination
        id: sim
        working-directory: IOS
        run: |
          set -euo pipefail

          pick_simulator_destination() {
            xcodebuild -showdestinations -project IOS.xcodeproj -scheme IOS 2>/dev/null \
              | grep '{ platform:iOS Simulator,' \
              | grep -v placeholder \
              | grep 'name:iPhone' \
              | head -1
          }

          # Warm CoreSimulator (runner-images workaround for simctl/xcodebuild races).
          xcrun simctl list devices available >/dev/null

          line="$(pick_simulator_destination || true)"
          if [[ -z "${line}" ]]; then
            echo "No iOS Simulator destinations for scheme IOS; downloading iOS platform..."
            xcodebuild -downloadPlatform iOS
            line="$(pick_simulator_destination || true)"
          fi

          if [[ -z "${line}" ]]; then
            echo "No compatible iOS Simulator destination (project requires iOS 26.5 SDK)." >&2
            xcodebuild -showdestinations -project IOS.xcodeproj -scheme IOS 2>&1 || true
            exit 1
          fi

          sim_id="$(printf '%s' "${line}" | sed -n 's/.* id:\([^,}]*\).*/\1/p')"
          sim_name="$(printf '%s' "${line}" | sed -n 's/.* name:\([^,}]*\).*/\1/p')"
          if [[ -z "${sim_id}" ]]; then
            echo "Failed to parse simulator id from: ${line}" >&2
            exit 1
          fi

          echo "destination=platform=iOS Simulator,id=${sim_id}" >> "$GITHUB_OUTPUT"
          echo "Using simulator: ${sim_name} (${sim_id})"

      - name: Build for testing
        working-directory: IOS
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project IOS.xcodeproj \
            -scheme IOS \
            -destination "${{ steps.sim.outputs.destination }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        working-directory: IOS
        run: |
          set -euo pipefail
          xcodebuild test-without-building \
            -project IOS.xcodeproj \
            -scheme IOS \
            -destination "${{ steps.sim.outputs.destination }}" \
            CODE_SIGNING_ALLOWED=NO
