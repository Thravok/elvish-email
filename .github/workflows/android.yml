# ELVish Mail — Flutter Android client (flutter/elvish_mail).
name: Android

on:
  push:
    branches: [main]
    paths:
      - "flutter/elvish_mail/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [main]
    paths:
      - "flutter/elvish_mail/**"
      - ".github/workflows/android.yml"

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Flutter analyze, test, and APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: flutter/elvish_mail

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-elvish-mail
          pub-cache-key: flutter-elvish-mail-pub

      - name: Prepare Android project
        run: |
          flutter pub get
          if [ ! -x android/gradlew ]; then
            echo "::error::android/gradlew is missing or not executable; commit the Android tree instead of regenerating it in CI."
            exit 1
          fi
          yes | flutter doctor --android-licenses || true

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

      - name: Build debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64
