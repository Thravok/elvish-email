name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
  - cron: "31 13 * * 4"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: go
          build-mode: manual
        - language: javascript-typescript
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        config-file: ./.github/codeql/codeql-config.yml

    - name: Set up Go
      if: matrix.language == 'go'
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Build Go
      if: matrix.language == 'go'
      run: CGO_ENABLED=0 go build ./...

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: /language:${{ matrix.language }}

  analyze-flutter-android:
    name: Analyze (flutter-android)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true
        cache-key: flutter-elvish-mail
        pub-cache-key: flutter-elvish-mail-pub

    - name: Prepare Flutter Android project
      working-directory: flutter/elvish_mail
      run: |
        flutter pub get
        if [ ! -x android/gradlew ]; then
          flutter create . --platforms=android --project-name elvish_mail --org org.elvish
          flutter pub get
        fi
        yes | flutter doctor --android-licenses || true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: java-kotlin
        build-mode: manual
        config-file: ./.github/codeql/codeql-config-flutter.yml

    - name: Build Flutter Android (debug)
      working-directory: flutter/elvish_mail
      run: flutter build apk --debug

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: /language:flutter-android
