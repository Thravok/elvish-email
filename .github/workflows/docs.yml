name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - 'scripts/docs-stage.py'
      - 'docker/docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - 'scripts/docs-stage.py'
      - 'docker/docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs.yml'

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mkdocs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs-site/requirements.txt
      - name: Install MkDocs
        run: python3 -m pip install -r docs-site/requirements.txt
      - name: Stage guides and build (strict)
        run: |
          python3 scripts/docs-stage.py
          cd docs-site && python3 -m mkdocs build --strict
