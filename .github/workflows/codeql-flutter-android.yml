# Flutter Android CodeQL (see .github/codeql/README.md).
# Kept separate from codeql-analysis.yml so cancel-in-progress on fast Go/JS jobs
# does not abort this ~7 minute Gradle build and upload a failed-run SARIF.
name: CodeQL Flutter Android

on:
  push:
    branches: [main]
    paths:
      - "flutter/elvish_mail/**"
      - ".github/codeql/codeql-config-flutter.yml"
      - ".github/workflows/codeql-flutter-android.yml"
  pull_request:
    branches: [main]
    paths:
      - "flutter/elvish_mail/**"
      - ".github/codeql/codeql-config-flutter.yml"
      - ".github/workflows/codeql-flutter-android.yml"
  schedule:
    - cron: "47 13 * * 4"

concurrency:
  group: codeql-flutter-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze-flutter-android:
    name: Analyze (flutter-android)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-elvish-mail
          pub-cache-key: flutter-elvish-mail-pub

      - name: Prepare Flutter Android project
        working-directory: flutter/elvish_mail
        run: |
          flutter pub get
          if [ ! -x android/gradlew ]; then
            echo "::error::android/gradlew is missing or not executable; commit the Android tree instead of regenerating it in CI."
            exit 1
          fi
          yes | flutter doctor --android-licenses || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: ./.github/codeql/codeql-config-flutter.yml

      - name: Build Flutter Android (debug)
        working-directory: flutter/elvish_mail
        run: flutter build apk --debug --target-platform android-arm64

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:flutter-android
