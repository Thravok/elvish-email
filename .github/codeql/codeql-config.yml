name: "ELVish server CodeQL"

# MaD pack loaded at analyze via CODEQL_ACTION_EXTRA_OPTIONS (see codeql-analysis.yml).

query-filters:
  - exclude:
      id: go/weak-sensitive-data-hashing
  - exclude:
      id: go/unvalidated-url-redirection

paths-ignore:
  - flutter/**
  - IOS/**
  - IOSTests/**
  - e2e/**
  - apps/web/dist/**
  - apps/admin/dist/**
