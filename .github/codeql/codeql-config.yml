name: "ELVish server CodeQL"

packs:
  - local:./.github/codeql/elvish-go-models

# Flutter Android is scanned in the analyze-flutter-android job.
paths-ignore:
  - flutter/**
  - IOS/**
  - IOSTests/**
  - e2e/**
  # Bundled output; scan sources under static/ and frontend/ instead.
  - static/dist/**
