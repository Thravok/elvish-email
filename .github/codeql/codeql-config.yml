name: "ELVish server CodeQL"

# Local MaD pack (elvish/go-models) is loaded via CODEQL_ACTION_EXTRA_OPTIONS in
# codeql-analysis.yml — do not use `local:` here; CodeQL 2.25 rejects it at init.

# Flutter Android is scanned in the analyze-flutter-android job.
paths-ignore:
  - flutter/**
  - IOS/**
  - IOSTests/**
  - e2e/**
  # Bundled output; scan JSX sources under apps/ instead.
  - apps/web/dist/**
  - apps/admin/dist/**

# Known false positives (documented in-source); path move from internal/ re-triggers on large PRs.
query-filters:
  - exclude:
      id: go/weak-sensitive-data-hashing
      paths:
        - libs/go/pake
  - exclude:
      id: go/unvalidated-url-redirection
      paths:
        - libs/go/httpserver/safe_redirect.go
