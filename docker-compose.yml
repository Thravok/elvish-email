# Local development: CockroachDB + Valkey + mail backends; optional api/mta/worker in containers.
#
# Databases only (for `make dev` / `make dev-once` on the host): `make db-up`
#   → cockroach + valkey + scylla + minio (+ automatic scylla-init + minio-init)
#
# Full stack in Docker: `make compose-up` (profile full) — browser + API on http://127.0.0.1:8765 via elvishapi
#
# Do not set COOKIE_SECURE for plain http://127.0.0.1 — session cookies must not use Secure on HTTP.

services:
  cockroach:
    image: cockroachdb/cockroach:v24.2.4
    container_name: elvish-cockroach
    # start-single-node in Docker: entrypoint only allows listen on 127.0.0.1:26257 (not 0.0.0.0).
    # Published ports still reach the node; do not pass --listen-addr/--advertise-addr unless they match that rule.
    hostname: cockroach
    command:
      - start-single-node
      - --insecure
      - --http-addr=cockroach:8080
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - elvish_crdb_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  valkey:
    image: redis:7-alpine
    container_name: elvish-valkey
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8

  scylla:
    image: scylladb/scylla:5.4
    container_name: elvish-scylla
    command:
      - --smp
      - "1"
      - --memory
      - 1G
      - --overprovisioned
      - "1"
      - --reactor-backend=epoll
      - --developer-mode
      - "1"
    ports:
      - "9042:9042"
      - "9180:9180"
    volumes:
      - elvish_scylla_data:/var/lib/scylla
    # Require CQL on 9042 — nodetool UN can appear before native_transport accepts clients.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh -h 127.0.0.1 -p 9042 -e 'SELECT cluster_name FROM system.local LIMIT 1' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  scylla-init:
    image: scylladb/scylla:5.4
    container_name: elvish-scylla-init
    depends_on:
      scylla:
        condition: service_healthy
    volumes:
      - ./internal/scyllastore/schema.cql:/schema.cql:ro
      - ./docker/scylla-init.sh:/scylla-init.sh:ro
    entrypoint: ["sh", "/scylla-init.sh"]
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: elvish-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${BLOB_S3_ACCESS_KEY:-elvish-dev}
      MINIO_ROOT_PASSWORD: ${BLOB_S3_SECRET_KEY:-elvish-dev-secret}
    ports:
      - "8333:9000"
      - "9001:9001"
    volumes:
      - elvish_minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      BLOB_S3_ACCESS_KEY: ${BLOB_S3_ACCESS_KEY:-elvish-dev}
      BLOB_S3_SECRET_KEY: ${BLOB_S3_SECRET_KEY:-elvish-dev-secret}
      BLOB_S3_BUCKET: ${BLOB_S3_BUCKET:-elvish-mail}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${BLOB_S3_ACCESS_KEY}" "$${BLOB_S3_SECRET_KEY}"; do
          sleep 1
        done
        mc mb --ignore-existing "local/$${BLOB_S3_BUCKET}"
    restart: "no"

  api:
    profiles: [full]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elvish-api
    depends_on:
      cockroach:
        condition: service_healthy
      valkey:
        condition: service_healthy
      scylla:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8765:8765"
    command: ["/usr/local/bin/elvishapi", "-addr", ":8765", "-root", "/app"]
    environment:
      - ELVISH_SMTP_ADDR=
      - ELVISH_SMTP_SUBMISSION_ADDR=
      - COCKROACH_DSN=${COCKROACH_DSN:-postgres://root@cockroach:26257/defaultdb?sslmode=disable}
      - VALKEY_ADDR=${VALKEY_ADDR:-valkey:6379}
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-}
      - VALKEY_DB=${VALKEY_DB:-0}
      - COOKIE_SECURE=${COOKIE_SECURE:-0}
      - ELVISH_AUTO_GEN_MFA_KEY=${ELVISH_AUTO_GEN_MFA_KEY:-1}
      - ELVISH_ALLOW_EMPTY_DB=${ELVISH_ALLOW_EMPTY_DB:-0}
      - SCYLLA_HOSTS=${SCYLLA_HOSTS:-scylla:9042}
      - SCYLLA_KEYSPACE=${SCYLLA_KEYSPACE:-elvish_mail}
      - BLOB_S3_ENDPOINT=${BLOB_S3_ENDPOINT:-http://minio:9000}
      - BLOB_S3_REGION=${BLOB_S3_REGION:-us-east-1}
      - BLOB_S3_BUCKET=${BLOB_S3_BUCKET:-elvish-mail}
      - BLOB_S3_ACCESS_KEY=${BLOB_S3_ACCESS_KEY:-elvish-dev}
      - BLOB_S3_SECRET_KEY=${BLOB_S3_SECRET_KEY:-elvish-dev-secret}
      - BLOB_S3_FORCE_PATH_STYLE=${BLOB_S3_FORCE_PATH_STYLE:-1}
    volumes:
      - elvish_data:/app/data

  mail-mta:
    profiles: [full]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elvish-mail-mta
    depends_on:
      cockroach:
        condition: service_healthy
      valkey:
        condition: service_healthy
      scylla:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["/usr/local/bin/elvishmta", "-root", "/app"]
    environment:
      - ELVISH_HTTP_ENABLED=0
      - ELVISH_MAIL_DOMAIN=${ELVISH_MAIL_DOMAIN:-localhost.test}
      - ELVISH_HOSTNAME=${ELVISH_HOSTNAME:-localhost.test}
      - ELVISH_SMTP_ADDR=:25
      - ELVISH_SMTP_SUBMISSION_ADDR=:587
      - COCKROACH_DSN=${COCKROACH_DSN:-postgres://root@cockroach:26257/defaultdb?sslmode=disable}
      - VALKEY_ADDR=${VALKEY_ADDR:-valkey:6379}
      - SCYLLA_HOSTS=${SCYLLA_HOSTS:-scylla:9042}
      - SCYLLA_KEYSPACE=${SCYLLA_KEYSPACE:-elvish_mail}
      - BLOB_S3_ENDPOINT=${BLOB_S3_ENDPOINT:-http://minio:9000}
      - BLOB_S3_REGION=${BLOB_S3_REGION:-us-east-1}
      - BLOB_S3_BUCKET=${BLOB_S3_BUCKET:-elvish-mail}
      - BLOB_S3_ACCESS_KEY=${BLOB_S3_ACCESS_KEY:-elvish-dev}
      - BLOB_S3_SECRET_KEY=${BLOB_S3_SECRET_KEY:-elvish-dev-secret}
      - BLOB_S3_FORCE_PATH_STYLE=${BLOB_S3_FORCE_PATH_STYLE:-1}
      - ELVISH_AUTO_GEN_MFA_KEY=${ELVISH_AUTO_GEN_MFA_KEY:-1}
    volumes:
      - elvish_data:/app/data
    ports:
      - "2525:25"
      - "2587:587"

  worker:
    profiles: [full]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elvish-worker
    depends_on:
      cockroach:
        condition: service_healthy
      valkey:
        condition: service_healthy
      scylla:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["/usr/local/bin/elvishworker", "-root", "/app"]
    environment:
      - COCKROACH_DSN=${COCKROACH_DSN:-postgres://root@cockroach:26257/defaultdb?sslmode=disable}
      - VALKEY_ADDR=${VALKEY_ADDR:-valkey:6379}
      - ELVISH_AUTO_GEN_MFA_KEY=${ELVISH_AUTO_GEN_MFA_KEY:-1}
      - ELVISH_ALLOW_EMPTY_DB=${ELVISH_ALLOW_EMPTY_DB:-0}
      - SCYLLA_HOSTS=${SCYLLA_HOSTS:-scylla:9042}
      - SCYLLA_KEYSPACE=${SCYLLA_KEYSPACE:-elvish_mail}
      - BLOB_S3_ENDPOINT=${BLOB_S3_ENDPOINT:-http://minio:9000}
      - BLOB_S3_REGION=${BLOB_S3_REGION:-us-east-1}
      - BLOB_S3_BUCKET=${BLOB_S3_BUCKET:-elvish-mail}
      - BLOB_S3_ACCESS_KEY=${BLOB_S3_ACCESS_KEY:-elvish-dev}
      - BLOB_S3_SECRET_KEY=${BLOB_S3_SECRET_KEY:-elvish-dev-secret}
      - BLOB_S3_FORCE_PATH_STYLE=${BLOB_S3_FORCE_PATH_STYLE:-1}
    volumes:
      - elvish_data:/app/data

volumes:
  elvish_data:
  elvish_crdb_data:
  elvish_scylla_data:
  elvish_minio_data:
